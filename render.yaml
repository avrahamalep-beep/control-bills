# Render: Web Service con Node (no "Static Site").
# https://render.com/docs/blueprint-spec
#
# En el dashboard, agrega (Environment) en TODO lo que está en .env.example:
# DATABASE_URL, AUTH_SECRET, AUTH_GOOGLE_*, AUTH_URL, NEXTAUTH_URL, ALLOWED_EMAILS
# Google Cloud: redirect URI = https://<tu-servicio>.onrender.com/api/auth/callback/google
#
# 502 Bad Gateway: revisa Logs en el dashboard (crashes, OOM, WORKER TIMEOUT). Render exige
# escuchar en 0.0.0.0 y el puerto en $PORT (Next.js lo hace por defecto). Health: GET /health
services:
  - type: web
    name: bills-control
    runtime: node
    healthCheckPath: /health
    # db push: crea/actualiza tablas en Neon en cada build (evita 500 si el DB estaba vacío)
    buildCommand: npm install --include=dev && npx prisma db push && npm run build
    startCommand: npm start
